name: build macOS app

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller yt-dlp imageio-ffmpeg

    - name: build app
      run: pyinstaller --windowed --icon=assets/janinhx.icns --add-data 'assets:assets' --name "youtube downloader da janinhx ♥" ytdl.py

    - name: create DMG
      run: |
        mkdir -p dist/dmg
        cp -r "dist/youtube downloader da janinhx ♥.app" dist/dmg/
        hdiutil create \
          -volname "youtube downloader da janinhx ♥" \
          -srcfolder dist/dmg \
          -ov \
          -format UDZO \
          dist/ytdownloader-janinhx.dmg

    - name: upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: yt-downloader-macos
        path: dist/ytdownloader-janinhx.dmg
